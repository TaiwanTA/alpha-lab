# alpha-lab canonical Compose：五服務 + 一網路 + 一份 secrets env_file。
# PR 2 簡化：YAML anchor 共用 restart/logging/env_file/networks，dags-sync
# sidecar 退役（DAGs bake 進 image，DAG 變更走 image rebuild + reload）。
# 所有 secrets 集中在 /etc/alpha-lab/secrets.env，所有服務可見（試驗專案
# 接受橫向暴露）。
#
# 正式部署時由 VM-only 的 /etc/alpha-lab/stack.env 提供 image tag、
# Hindsight 內部資料庫 URL 等 interpolation 變數；所有秘密值都留在
# /etc/alpha-lab/secrets.env，不進入 repository。

x-defaults: &default-service
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  env_file:
    - /etc/alpha-lab/secrets.env
  networks:
    - alpha_lab_net

services:
  alpha-lab-dagu:
    <<: *default-service
    image: ghcr.io/taiwanta/alpha-lab-dagu:${ALPHA_LAB_IMAGE_TAG:-latest}
    # dagu 預設讀 DAGU_HOME/base.yaml,不讀 /etc/dagu/admin.yaml;
    # 顯式 -c 讓 image-baked admin.yaml 生效（PR 2 Task 1 驗證）。
    command: ["dagu", "start-all", "-c", "/etc/dagu/admin.yaml"]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PUID: "999"
      PGID: "982"
      HOME: /var/lib/alpha-lab/dagu
      DAGU_HOME: /var/lib/alpha-lab/dagu
      # 以 Compose DNS 連線，不能在 container 內使用 127.0.0.1。
      # GH_PR_TOKEN / GIT_READ_TOKEN 由 secrets.env 注入。
      HINDSIGHT_BASE_URL: http://hindsight:8888
    volumes:
      # state 路徑跟 host bind mount 共享，PUID 999 對齊 volume owner。
      - /var/lib/alpha-lab/dagu:/var/lib/alpha-lab/dagu
    depends_on:
      hindsight:
        condition: service_healthy
      alpha-lab-postgres:
        condition: service_healthy

  hindsight-db:
    <<: *default-service
    image: pgvector/pgvector:pg${HINDSIGHT_DB_VERSION:-18}
    volumes:
      - hindsight_pgdata:/var/lib/postgresql/${HINDSIGHT_DB_VERSION:-18}/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  hindsight:
    <<: *default-service
    image: ghcr.io/vectorize-io/hindsight:${HINDSIGHT_VERSION:-latest-slim}
    entrypoint:
      - /bin/sh
      - -c
      - >-
        uv pip install --python /app/api/.venv/bin/python --quiet
        --link-mode=copy flashrank && exec /app/start-all.sh
    environment:
      # stack.env 提供 HINDSIGHT_API_DATABASE_URL（host 必須是 hindsight-db）。
      HINDSIGHT_API_DATABASE_URL: ${HINDSIGHT_API_DATABASE_URL:?set URL with hindsight-db host}
      HINDSIGHT_API_VECTOR_EXTENSION: pgvector
    ports:
      - "127.0.0.1:8888:8888"
    depends_on:
      hindsight-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8888/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  alpha-lab-postgres:
    <<: *default-service
    image: postgres:16-alpine
    volumes:
      - research_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  mastra-app:
    <<: *default-service
    image: ${MASTRA_IMAGE:?set immutable mastra image or existing VM tag}
    user: "1001:1001"
    ports:
      - "127.0.0.1:4111:4111"
    environment:
      PORT: "4111"
      HOST: 0.0.0.0
      LOG_LEVEL: info
      DATABASE_URL: file:/data/mastra.db
    volumes:
      - mastra_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4111/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true

networks:
  alpha_lab_net:
    name: alpha-lab-net
    driver: bridge
    internal: false

volumes:
  hindsight_pgdata:
    name: alpha_lab_hindsight_pgdata
  research_pgdata:
    external: true
    name: research_pgdata
  mastra_data:
    external: true
    name: mastra-data
