# Dagu runtime as a Docker compose stack on the alpha-lab VM.
#
# 設計目標:在另一台 VM 上還原這份 compose + automation/scripts/
# setup-vm.sh 就能跑出跟現在 production 一樣的 dagu runtime
# + DAG 同步機制,不需要再手動跑 deploy-dagu.sh。
#
# 兩個服務:
#   - `dagu`:Dagu 排程器,跑 999:982 (對應 host alpha-lab-dagu
#     user)。Persistent state (data / logs / admin) 走 host
#     bind mount /var/lib/alpha-lab/dagu。dags_dir 走獨立路徑
#     /var/lib/alpha-lab/dagu-dags,搭配 named volume `dags`
#     由 sidecar 寫入最新 main 版本。dags_dir 跟 dagu state
#     不同 parent 是為了避免 named volume shadow host bind
#     mount (見 admin.yaml `paths.dags_dir`)。
#   - `dags-sync`:sidecar 服務,alpine + git + openssh-client。
#     Entry script `dags-sync.sh` 第一次跑 `git clone`,之後
#     每 5 分鐘 `git pull`。使用 SSH deploy key 同步
#     automation/dags/ 到 named volume。
#
# 已拿掉的東西 (跟 PR #20/21 時代的差異):
#   - docker.sock 拿掉 — 之前是為了 `docker exec hermes-hermes-1`
#     (PR #20 移除 Hermes,不再需要)
#   - /opt/alpha-lab/automation bind mount 拿掉 — dags 透過
#     sidecar 從 git 拉,不是 host bind mount
#   - 沒 read_only: true — dagu 內部在 dags_dir 寫 metadata
#   - 沒 security_opt: no-new-privileges — 999:982 user 已是
#     unprivileged,加上會跟 git pull 寫入衝突
#
# 注意:VM 上還沒切到這個 compose。切換流程見
# automation/scripts/setup-vm.sh + AGENTS.md「部署流程」。

name: alpha-lab-dagu

services:
  dagu:
    image: ghcr.io/dagu-org/dagu:2.10.7
    container_name: alpha-lab-dagu
    restart: unless-stopped
    user: "999:982"  # alpha-lab-dagu host uid:gid,避免 owner 變 root
    command: ["start-all"]  # foreground so docker compose sees liveness
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      # /etc/alpha-lab/dagu.env 是 mode 0440 root:alpha-lab-dagu。
      # container 跑 999:982 對應 host user,可以讀。
      - /etc/alpha-lab/dagu.env
    environment:
      # Override HINDSIGHT_BASE_URL: env file 內是 host-loopback
      # URL (給人用工具看),但 container 內 127.0.0.1 是 container
      # 自己的 loopback。Hindsight 跑在同一個 hindsight-net 上,
      # 用 container name 連。
      HINDSIGHT_BASE_URL: "http://hindsight-hindsight-1:8888"
    volumes:
      # Persistent dagu state (runs, logs, admin) 走 host bind
      # mount。dags_dir 完全由 named volume `dags` 提供,由
      # sidecar 寫入;host 上不應有 /var/lib/alpha-lab/dagu-dags
      # 實體目錄,容器內 dagu 跟 sidecar 透過 named volume 共享。
      - /var/lib/alpha-lab/dagu:/var/lib/alpha-lab/dagu
      - dags:/var/lib/alpha-lab/dagu-dags:rw
    networks:
      - hindsight-net

  dags-sync:
    # 用 repo 內 Dockerfile.dags-sync build image:USER 999:982、
    # dags-sync.sh COPY 進 image 都已在 Dockerfile 內做。改
    # dags-sync.sh / Dockerfile 需要 `docker compose build`
    # 重 build;setup-vm.sh 跟 deploy-dagu.sh 都會跑。
    build:
      context: ./deploy/dagu
      dockerfile: Dockerfile.dags-sync
    container_name: alpha-lab-dags-sync
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/dags-sync.sh"]
    env_file:
      - /etc/alpha-lab/dagu.env
    environment:
      # Sidecar 自己用的設定 (不影響 dagu)
      DAG_SYNC_REPO: "git@github.com:TaiwanTA/alpha-lab.git"
      DAG_SYNC_BRANCH: "main"
      DAG_SYNC_PATH: "automation/dags"
      DAG_SYNC_INTERVAL: "300"  # 5 min
      DAG_SYNC_TARGET: "/var/lib/alpha-lab/dagu-dags"
      GIT_SSH_COMMAND: "ssh -i /home/alpha-lab-dagu/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
    volumes:
      # SSH key 跟 dagu 共享 host 上的 deploy key
      - /var/lib/alpha-lab/dagu/.ssh:/home/alpha-lab-dagu/.ssh:ro
      # 寫入 dags named volume (跟 dagu 共享)
      - dags:/var/lib/alpha-lab/dagu-dags:rw
    networks:
      - hindsight-net
    tty: false

networks:
  hindsight-net:
    external: true
    name: hindsight-net

volumes:
  dags:
    # 沒有 driver 設定 = local driver。資料落在
    # /var/lib/docker/volumes/alpha-lab-dagu_dags/_data/。
    # 重現時 `docker compose up` 會自動建立,dags-sync 第一次
    # 跑會 git clone 進去。
