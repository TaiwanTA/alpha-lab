# Dagu runtime as a Docker compose service on the alpha-lab VM.
#
# NOTE: This compose file is NOT yet active on the VM — dagu
# currently runs as a bare systemd service on the host (see
# alpha-lab-dagu.service). Switching to compose is tracked as a
# P2 housekeeping item. Hermes was removed from the pipeline
# (replaced by research-agent.ts, a self-contained TypeScript
# agent that calls LLM + Hindsight APIs directly). The
# docker.sock mount and hindsight-net membership below were
# originally needed for `docker exec hermes-hermes-1 ...`;
# after Hermes removal, docker.sock can likely be dropped when
# this compose is activated (pending review).
#
# Topology (when activated):
#   - joins the shared `hindsight-net` external network so it
#     can reach `hindsight-hindsight-1:8888` for Hindsight API
#     calls from research-agent.ts (if running inside container);
#   - mounts the host's `/opt/alpha-lab/automation` so DAG
#     scripts work without rebuilding the image.

name: alpha-lab-dagu

services:
  dagu:
    image: ghcr.io/dagu-org/dagu:2.10.7
    container_name: alpha-lab-dagu
    restart: unless-stopped
    user: "0:0"  # docker.sock access requires root in the container
    command: ["start-all"]  # foreground so systemd sees liveness; legacy unit ran `start-all`
    # docker.sock mount was originally for `docker exec
    # hermes-hermes-1 ...`. Hermes is now removed; this mount
    # can be dropped when compose is activated. Left in place
    # for now to avoid breaking other potential docker calls.
    # Mitigations below are best-effort:
    #   - no-new-privileges: blocks setuid binary abuse
    #   - read_only rootfs: blocks in-container persistence
    #     (dagu still writes via the dagu_data tmpfs mount)
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      # 可寫 scratch。read_only rootfs 下,/tmp 跟 /var/tmp
      # 是 dagu 跑 step 的 process working dir 跟 run
      # artifact 落地點。持久狀態 (/var/lib/alpha-lab/dagu
      # 底下的 dag-runs / logs / admin) 走 host bind mount
      # 而不是 tmpfs,reboot 之後資料還在。
      - /tmp
      - /var/tmp
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      # /etc/alpha-lab/dagu.env is mode 0440 root:alpha-lab-dagu.
      # dagu's container runs as root so it can read the file.
      # Tighten to `user: "999:982"` after adding the alpha-lab-dagu
      # host user to the docker group and switching to a non-root
      # container user.
      - /etc/alpha-lab/dagu.env
    environment:
      # Override HINDSIGHT_BASE_URL: the env file records the
      # host-loopback URL (useful for human-facing tooling on the
      # VM), but from inside this container `127.0.0.1` is the
      # container's own loopback, not the host. The Hindsight
      # service is on the same `hindsight-net`; reach it by its
      # container name.
      HINDSIGHT_BASE_URL: "http://hindsight-hindsight-1:8888"
    volumes:
      # Persistent dagu state (dags, runs, logs).
      - /var/lib/alpha-lab/dagu:/var/lib/alpha-lab/dagu
      # Live source for the DAGs and helper scripts. Read-only so
      # steps cannot accidentally mutate the deployed automation.
      - /opt/alpha-lab/automation:/opt/alpha-lab/automation:ro
      # docker.sock — originally for `docker exec hermes-hermes-1`.
      # Hermes removed; can likely be dropped when compose is
      # activated. Left for now to avoid surprises.
    networks:
      - hindsight-net

networks:
  hindsight-net:
    external: true
    name: hindsight-net
