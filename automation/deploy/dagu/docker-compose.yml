# 已棄用：正式環境請使用 repository root 的 compose.yml canonical 六服務 stack。
# 本檔僅保留供 rollback 參考，不應由 systemd 或 GitHub Actions 啟動。

# Dagu runtime compose：runtime image 由 GitHub Actions build 後推送到
# GHCR，VM 只需 pull image，不需要把 `/opt/alpha-lab/automation`
# source checkout bind mount 進 dagu container。
#
# 服務:
#   - `dagu`:Dagu 排程器，執行 GHCR 上的 alpha-lab-dagu image。
#     image 內含 git/node22/bun/ssh/rsync 與 automation scripts、
#     production node_modules、dags、config、migrations。
#   - `dags-sync`:sidecar 服務，執行 GHCR 上的 dags-sync image。
#     它仍從 GitHub sparse clone 最新 automation/dags，再 rsync
#     到 Dagu state 的 dags 子目錄；DAG 定義可獨立於 runtime image 更新。
#
# Persistent dagu state（data/logs/dags/ssh keys/workspace）仍走
# `/var/lib/alpha-lab/dagu` data mount；本次移除的是原始碼 mount。
#
# Dagu image tag:
#   `ALPHA_LAB_IMAGE_TAG` 可指定 immutable commit SHA；未指定時用 latest。
#   production 建議由部署環境固定 SHA，避免 latest 在重啟時漂移。
#
# PUID/PGID 機制:
#   官方 entrypoint.sh (/usr/local/bin/tini -g -- /entrypoint.sh)
#   以 root 啟動,groupmod/usermod 把 dagu user 改成
#   PUID/PGID,然後 `sudo -u #PUID -g #PGID` 降權執行 cmd。
#   所以 compose 不設 `user:`,而是設 PUID=999 PGID=982
#   環境變數讓 entrypoint 處理降權。
#
# HOME 覆蓋:
#   entrypoint 的 `sudo -H` 會把 HOME 設成 dagu user 的
#   home dir (/home/dagu,容器層,不持久)。設 HOME=
#   /var/lib/alpha-lab/dagu 讓 npm/bun cache 寫進 bind mount,
#   跨 container restart 持久化。
#
# DAGU_HOME:
#   entrypoint.sh `mkdir -p ${DAGU_HOME}` + export。
#   設 DAGU_HOME=/var/lib/alpha-lab/dagu 跟 bind mount 對齊,
#   dagu state (data/logs/admin/dags) 全在 bind mount 上。
#
# 已拿掉的東西 (跟 PR #20/21 時代的差異):
#   - docker.sock 拿掉 — 之前是為了 `docker exec hermes-hermes-1`
#     (PR #20 移除 Hermes,不再需要)
#   - 沒 read_only: true — npm/bun/git 需要寫 $HOME/cache
#   - 沒 named volume dags — dags 改走 bind mount 子目錄
#     /var/lib/alpha-lab/dagu/dags,跟 production 一致,
#     不需要 path migration
#   - extra_hosts: host.docker.internal:host-gateway 拿掉 —
#     DATABASE_URL 改成走容器 DNS alias `alpha-lab-postgres`,
#     所以 dagu 必須跟 postgres 同 network。下面在 dagu
#     service 加了 `research_default` external network。
#
# Networks:
#   - hindsight-net:本 stack 自有,連 Hindsight
#     (`hindsight-hindsight-1:8888`)。dags-sync 也在這。
#   - research_default:由另一個 compose project 擁有,
#     `alpha-lab-postgres` 在裡面。Dagu 為了連 postgres
#     也 join 這個 external network(用 container name
#     `alpha-lab-postgres` 當 DATABASE_URL host)。dags-sync
#     不需要(dags-sync 只跟 GitHub 用 SSH 講話)。

name: alpha-lab-dagu

services:
  dagu:
    # image 由 .github/workflows/build-images.yml 推送到 GHCR。
    # VM 只需 `docker compose pull`，不需 repo source/build context。
    # production 可由部署環境指定 immutable commit SHA；
    # 未指定時使用 latest。
    image: ghcr.io/taiwanta/alpha-lab-dagu:${ALPHA_LAB_IMAGE_TAG:-latest}
    container_name: alpha-lab-dagu
    restart: unless-stopped
    # 不設 `user:` — 官方 entrypoint.sh 以 root 啟動，透過
    # PUID/PGID 環境變數降權到 999:982。
    # 覆蓋官方 Cmd：entrypoint.sh 的 sudo -u 執行 command，
    # sudo 不繼承 root 的 PATH，所以要用完整 binary path。
    command: ["dagu", "start-all"]
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      # /etc/alpha-lab/dagu.env 是 mode 0440 root:alpha-lab-dagu。
      # container 以 999:982 跑,對應 host group alpha-lab-dagu,
      # 可以讀。env_file 注入變數到 process env,但檔案本身
      # 不在 container 內 — DAG step 用 `. /etc/alpha-lab/dagu.env`
      # 需要另掛 bind mount (見下方 volumes)。
      - /etc/alpha-lab/dagu.env
    environment:
      # PUID/PGID 讓 entrypoint.sh groupmod/usermod + sudo 降權。
      PUID: "999"
      PGID: "982"
      # HOME 覆蓋 sudo -H 的預設 /home/dagu,讓 npm/bun cache
      # 寫進 bind mount (持久化,跨 container restart)。
      HOME: "/var/lib/alpha-lab/dagu"
      # DAGU_HOME 跟 bind mount 對齊,dagu state 全在
      # host /var/lib/alpha-lab/dagu。
      DAGU_HOME: "/var/lib/alpha-lab/dagu"
      # Override HINDSIGHT_BASE_URL: env file 內是 host-loopback
      # URL (給人用工具看),但 container 內 127.0.0.1 是 container
      # 自己的 loopback。Hindsight 跑在同一個 hindsight-net 上,
      # 用 container name 連。
      HINDSIGHT_BASE_URL: "http://hindsight-hindsight-1:8888"
    volumes:
      # Persistent dagu state (data, logs, admin, dags, .ssh,
      # workspace) 全走這個 bind mount。
      - /var/lib/alpha-lab/dagu:/var/lib/alpha-lab/dagu
      # /etc/alpha-lab/dagu.env — env_file 只注入變數,檔案
      # 不在 container fs。DAG step 做 `. /etc/alpha-lab/dagu.env`
      # 需要這個 bind mount。
      - /etc/alpha-lab/dagu.env:/etc/alpha-lab/dagu.env:ro
    networks:
      # 兩個 network 都要 join — hindsight-net 連 Hindsight,
      # research_default 連 postgres(透過容器 DNS alias
      # `alpha-lab-postgres`)。DB 連線不再用
      # host.docker.internal。
      - hindsight-net
      - research_default

  dags-sync:
    # image 由 .github/workflows/build-images.yml 推送到 GHCR；
    # VM 不需 automation source/build context。
    image: ghcr.io/taiwanta/alpha-lab-dags-sync:${ALPHA_LAB_IMAGE_TAG:-latest}
    container_name: alpha-lab-dags-sync
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/dags-sync.sh"]
    environment:
      # Sidecar 自己用的設定 (不影響 dagu)
      DAG_SYNC_REPO: "git@github.com:TaiwanTA/alpha-lab.git"
      DAG_SYNC_BRANCH: "main"
      DAG_SYNC_PATH: "automation/dags"
      DAG_SYNC_INTERVAL: "300"  # 5 min
      # dags_dir 跟 dagu 一致,走 bind mount 子目錄
      DAG_SYNC_TARGET: "/var/lib/alpha-lab/dagu/dags"
      GIT_SSH_COMMAND: "ssh -i /home/alpha-lab-dagu/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
      # HOME 對齊 SSH key bind mount 的路徑
      HOME: "/home/alpha-lab-dagu"
    volumes:
      # DAG state 走 bind mount,dags-sync 寫
      # /var/lib/alpha-lab/dagu/dags 子目錄
      - /var/lib/alpha-lab/dagu:/var/lib/alpha-lab/dagu
      # SSH key 跟 dagu 共享 host 上的 deploy key
      - /var/lib/alpha-lab/dagu/.ssh:/home/alpha-lab-dagu/.ssh:ro
    networks:
      - hindsight-net

networks:
  hindsight-net:
    external: true
    name: hindsight-net
  research_default:
    external: true
    name: research_default
