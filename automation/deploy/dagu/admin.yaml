# Dagu admin configuration for the alpha-lab VM.
#
# Non-secret configuration only. The bootstrap admin credential is
# supplied through Dagu's first-run loopback UI and is stored in
# the VM secret store, never in this file. `GIT_READ_TOKEN` 是
# git-pull automation/dags/ 用的 fine-grained PAT,放在
# /etc/alpha-lab/dagu.env (mode 0440 root:alpha-lab-dagu)。
# 注意:dagu 內部 `${env.NAME}` 解析在 dagu 2.10.7 已實測可
# 用 — 跟舊註解講的「token 經 env_file 注入」不同,目前
# git_sync 是 disabled,所以這個 token 沒被 dagu 自己使用,
# 而是給 dags-sync sidecar 的 git pull 走 HTTPS BasicAuth
# (`oauth2:<token>`) 用。
#
# Verified Dagu v2.10.7 contract:
#   - `${env.NAME}` is the only form that resolves to the process
#     environment. There is no `${secrets.X}` namespace.
#   - `secrets:` block in `admin.yaml` exists for external secret
#     providers (Vault, file); it is not used here.
#
# dags_dir 跟 dagu state 同 parent (/var/lib/alpha-lab/dagu)。
# 在 docker-compose 模式下,/var/lib/alpha-lab/dagu 整個走
# bind mount,dags 子目錄跟 dagu state 共用同一個 mount。
# 不需要拆出來 — 原本拆到 /var/lib/alpha-lab/dagu-dags 是
# 為了避開 named volume shadowing,但 compose v2 不用 named
# volume (dags 走 bind mount 子目錄),所以沒這問題。
# dags-sync sidecar 寫 dags 子目錄,dagu 從 dags 子目錄
# load DAG,跟 native 模式路徑一致。
#
# git_sync 維持 disabled:PR #23 實測 dagu v2.10.7 git_sync
# interval tick 不觸發 (background sync 0 log),只有 on_startup
# pull。DAG 同步改由外部 dags-sync sidecar 處理,跟 dagu 內部
# git_sync 解耦。已驗證的 v2.10.7 git_sync 限制保留供未來
# 參考:
#   - auth.type 限定 'token' 或 'ssh' (basic 觸發 init 失敗)
#   - type: token 走 go-git Bearer header,GitHub HTTPS 拒絕
#     fine-grained PAT Bearer,401
#   - type: ssh 需明確 ssh_key_path
#
# 將來啟用 git_sync 需要:升 dagu 修 interval timer bug.

host: "127.0.0.1"
port: 8080
paths:
  # dags 跟 dagu state 同 parent (bind mount 子目錄),
  # 跟 native 模式路徑一致,不需要 path migration。
  dags_dir: /var/lib/alpha-lab/dagu/dags
  data_dir: /var/lib/alpha-lab/dagu/data
  log_dir: /var/lib/alpha-lab/dagu/logs

git_sync:
  enabled: false
  repository: github.com/TaiwanTA/alpha-lab
  branch: main
  path: automation/dags
  auth:
    type: token
    token: "${env.GIT_READ_TOKEN}"
  auto_sync:
    enabled: false
    on_startup: false
    interval: 300
  push_enabled: false
