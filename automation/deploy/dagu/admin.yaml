# Dagu admin configuration for the alpha-lab VM.
#
# Non-secret configuration only. The bootstrap admin credential is
# supplied through Dagu's first-run loopback UI and is stored in
# the VM secret store, never in this file. `GIT_READ_TOKEN` is
# injected as a process environment variable by the dagu container's
# `env_file:` entry (see docker-compose.yml) and referenced here as
# `${env.GIT_READ_TOKEN}`. The legacy `${secrets.X}` form is not a
# v2.10.7 strict-binding namespace and would be stored as a literal
# string, which `git_sync` would then send to GitHub as the
# BasicAuth password.
#
# Verified Dagu v2.10.7 contract:
#   - `${env.NAME}` is the only form that resolves to the process
#     environment. There is no `${secrets.X}` namespace.
#   - `secrets:` block in `admin.yaml` exists for external secret
#     providers (Vault, file); it is not used here.
#
# git_sync 是 disabled:曾嘗試在 PR #23 啟用,實測 dagu v2.10.7
# git_sync 只有 on_startup pull 會把 `data/gitsync/repo/<path>`
# 同步到 `dags_dir`,**interval: 300 的 background tick 在
# 2.10.7 沒有實際觸發** (dagu.service 啟動後 journalctl 0 條
# sync log,5 分鐘後 dags_dir 髒資料未被覆寫回 main)。所以
# 啟用 git_sync 不會比 deploy-dagu.sh 省事 — 改 DAG 後仍要
# `systemctl restart alpha-lab-dagu.service`,反而比 deploy
# 流程多了人為操作。留 disabled,等 dagu 修好 interval timer。
#
# 已驗證的 v2.10.7 git_sync 限制 (保留供未來參考):
#   - `auth.type` 限定 `token` 或 `ssh` — `basic` 觸發
#     `git sync auth type must be 'token' or 'ssh' (got: "basic")`
#     初始化失敗。
#   - `type: token` 走 go-git Bearer header,GitHub HTTPS 不接受
#     fine-grained PAT 走 Bearer,401。
#   - `type: ssh` 需明確指定 `ssh_key_path` (不能依賴
#     `~/.ssh/id_ed25519` 自動找)。
#   - `path: <subpath>` 在 startup pull 時會把 subpath 底下的
#     YAML 同步到 `dags_dir` 根目錄 (實測 fixture-research +
#     blog-publish 都正確同步)。
#   - `interval: 300` 不觸發 (v2.10.7 已知行為或 bug)。
#
# 將來啟用時需要:`type: ssh` + `ssh_key_path` + 接受
# 「改 DAG 後要 `systemctl restart alpha-lab-dagu.service`」
# 的限制,或先升 dagu 修 interval timer。

host: "127.0.0.1"
port: 8080
paths:
  dags_dir: /var/lib/alpha-lab/dagu/dags
  data_dir: /var/lib/alpha-lab/dagu/data
  log_dir: /var/lib/alpha-lab/dagu/logs

git_sync:
  enabled: false
  repository: "github.com/TaiwanTA/alpha-lab"
  branch: main
  path: automation/dags
  auth:
    type: token
    token: "${env.GIT_READ_TOKEN}"
  auto_sync:
    enabled: false
    on_startup: false
    interval: 300
  push_enabled: false
