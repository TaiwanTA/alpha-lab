# Dagu admin configuration for the alpha-lab VM.
#
# Non-secret configuration only. The bootstrap admin credential is
# supplied through Dagu's first-run loopback UI and is stored in
# the VM secret store, never in this file. `GIT_READ_TOKEN` is
# injected as a process environment variable by the dagu container's
# `env_file:` entry (see docker-compose.yml) and referenced here as
# `${env.GIT_READ_TOKEN}`. The legacy `${secrets.X}` form is not a
# v2.10.7 strict-binding namespace and would be stored as a literal
# string, which `git_sync` would then send to GitHub as the
# BasicAuth password.
#
# Verified Dagu v2.10.7 contract:
#   - `${env.NAME}` is the only form that resolves to the process
#     environment. There is no `${secrets.X}` namespace.
#   - `secrets:` block in `admin.yaml` exists for external secret
#     providers (Vault, file); it is not used here.
#
# git_sync 是 disabled:目前的 deploy-dagu.sh 用手動 cp
# `automation/dags/*.yaml` 到 dags_dir 的 pinned-checkout 模式,
# 穩定但每次 automation/dags 變更要跑一次 deploy。
#
# v3 rebuild merge (PR #18) 之後 `automation/dags/` 已經在
# main;如果要切到 git_sync 自動拉,要先:
#   1. 把 admin.yaml push 到 VM 並 cp 到
#      /var/lib/alpha-lab/dagu/admin.yaml
#   2. 確認 VM dags_dir 裡現存的 blog-publish.yaml /
#      fixture-research.yaml 跟 main 上一樣 (git_sync 啟動
#      會 overwrite)
#   3. 把這裡改成 enabled: true + auto_sync.enabled: true
#      + on_startup: true
#   4. systemctl restart alpha-lab-dagu.service 並觀察
#      journalctl 看 git_sync pull 記錄
# 這個 PR 先保持 disabled,把上面提到的安全檢查做完再切。
# Adjacent feature,留 explicit operational gating。

host: "127.0.0.1"
port: 8080
paths:
  dags_dir: /var/lib/alpha-lab/dagu/dags
  data_dir: /var/lib/alpha-lab/dagu/data
  log_dir: /var/lib/alpha-lab/dagu/logs

git_sync:
  enabled: false
  repository: github.com/TaiwanTA/alpha-lab
  branch: main
  path: automation/dags
  auth:
    type: token
    token: "${env.GIT_READ_TOKEN}"
  auto_sync:
    enabled: false
    on_startup: false
    interval: 300
  push_enabled: false
