# Dagu admin configuration for the alpha-lab VM.
#
# Non-secret configuration only. The bootstrap admin credential is
# supplied through Dagu's first-run loopback UI and is stored in
# the VM secret store, never in this file. `GIT_READ_TOKEN` 是
# git-pull automation/dags/ 用的 fine-grained PAT,放在
# /etc/alpha-lab/secrets.env (mode 0440 root:alpha-lab-dagu)。
# 注意:dagu 內部 `${env.NAME}` 解析在 dagu 2.10.7 已實測可用,
# 跟舊註解講的「token 經 env_file 注入」不同。token 不被 dagu 自己
# 使用,而是給 blog-publish 的 `commands/clone-publish.ts` 走
# GIT_ASKPASS 協定用。
#
# Verified Dagu v2.10.7 contract:
#   - `${env.NAME}` is the only form that resolves to the process
#     environment. There is no `${secrets.X}` namespace.
#   - `secrets:` block in `admin.yaml` exists for external secret
#     providers (Vault, file); it is not used here.
#   - compose `command:` 必須顯式 `-c /etc/dagu/admin.yaml`,
#     否則 dagu 預設讀 DAGU_HOME/base.yaml 不讀此檔。
#
# dags_dir 指向 image 內路徑（PR 2 dags-sync sidecar 退役）。
# DAG 變更透過 image rebuild + compose reload 生效,跟 native
# 模式不同（native 模式 DAG 在 host filesystem）。
#
# git_sync 維持 disabled:PR #23 實測 dagu v2.10.7 git_sync interval
# tick 不觸發 (background sync 0 log),只有 on_startup pull。
# DAG 同步改由 push-to-deploy 機制 + image rebuild 處理。
# 已驗證的 v2.10.7 git_sync 限制保留供未來參考:
#   - auth.type 限定 'token' 或 'ssh' (basic 觸發 init 失敗)
#   - type: token 走 go-git Bearer header,GitHub HTTPS 拒絕
#     fine-grained PAT Bearer,401
#   - type: ssh 需明確 ssh_key_path
#
# 將來啟用 git_sync 需要:升 dagu 修 interval timer bug.

# host 0.0.0.0:讓 compose `127.0.0.1:8080:8080` port forward 能連進 container。
# 暴露範圍由 compose port mapping 限制在 host loopback,不靠 dagu 綁定。
# 舊版 (PR #63 前) dagu 讀 DAGU_HOME/base.yaml (無 host 設定,預設 0.0.0.0);
# PR #63 改 -c /etc/dagu/admin.yaml 後若 host=127.0.0.1 會 break port forward。
host: "0.0.0.0"
port: 8080
paths:
  # DAGs bake 進 image（dags-sync sidecar 退役，PR 2）。
  # DAG 變更透過 image rebuild + compose reload 生效。
  dags_dir: /opt/alpha-lab/automation/dags
  data_dir: /var/lib/alpha-lab/dagu/data
  log_dir: /var/lib/alpha-lab/dagu/logs

git_sync:
  enabled: false
  repository: github.com/TaiwanTA/alpha-lab
  branch: main
  path: automation/dags
  auth:
    type: token
    token: "${env.GIT_READ_TOKEN}"
  auto_sync:
    enabled: false
    on_startup: false
    interval: 300
  push_enabled: false
