# 子 DAG,由 `publish-next-research` 以 stored research run 调用。
# 通过 GitHub Contents API 直接把候选 Markdown commit 到 main,
# 不开 PR、不开分支、不需要本地 git workstation。
#
# 已验证 Dagu v2.10.7 语法:
#   - DAG-level `env:` 是唯一能展開 ${NAME} (從 dagu server process env
#     讀值) 的位置。step `env:` 區塊的 ${env.NAME} / ${NAME} 都不會展開
#     (會被當字串字面值傳給子進程)。所以 step env 廢棄,只用 DAG-level env。
#   - `output: VARNAME` 把 step 的 stdout 收成字符串变量。
#   - `working_dir:` (不是 `dir:`);`DAG_RUN_ID` (不是 `DAGU_RUN_ID`)。
#   - `${DAG_RUN_WORK_DIR}` 是 v2.10.7 内置的绝对 `work/` 路径。
#
# 子 DAG 接收三個參數:
#   - `research_run_id` (已接受且被 publication worker claim 的 UUID)
#   - `claim_owner` (publication worker 的 DAG_RUN_ID,用于 release claim)
#   - `runtime_sha` (runtime commit SHA,由 github-publish.ts 寫入文末
#     `## 來源` 之後的 HTML 註解 `<!-- alpha-lab runtime: <sha> -->`,作為
#     「這篇文章是在哪個 repo 版本下被產出」的溯源標記)
#
# 流程:
#   1. materialize_candidate:从 DB 拉 candidate_markdown 写到工作目录
#   2. publish_via_api:跑 github-publish.ts
#      - renderPublishContent 验证 frontmatter / body / sources
#      - GET /contents/{path}?ref=main 检查是否已存在 (idempotent)
#      - PUT /contents/{path} branch=main → 一次 call = commit + push
# 不運行 git clone / git push / gh CLI (走 REST API 取代)。
# 本地 lint (renderPublishContent 的三道验证) 取代 reviewer bot 把关格式。
#
# ruleset:
#   repo-level ruleset 18699827 已放鬆 pull_request rule,
#   PAT (GH_PR_TOKEN) 可直推 main。deletion / non_fast_forward 仍保護。

params:
  research_run_id: ""
  claim_owner: ""
  runtime_sha: ""

artifacts:
  enabled: true
timeout_sec: 900
type: graph

# 容器模式下 /bin/sh → dash,不支援 pipefail。用 bash 執行
# 所有 step commands,跟 native 模式 (Fedora / bin/sh → bash)
# 行為一致。

shell: ["bash", "-e"]
env:
  - DATABASE_URL=${DATABASE_URL}
  # github-publish.ts 只需要 GH_PR_TOKEN 走 Bearer 認證 GitHub REST API。
  # 不再需要 GIT_READ_TOKEN (沒有 git clone)、GH_TOKEN (沒有 gh CLI)、
  # GIT_SSH_COMMAND / SSH key (沒有 git push)。
  - GH_PR_TOKEN=${GH_PR_TOKEN}
handler_on:
  failure:
    run: |
      if [ -n "${params.research_run_id}" ]; then
        # publish 失敗時釋放 claim,讓下次 publish-next-research retry
        # 可以重新 claim 同一篇研究。releasePublicationClaim 只刪
        # status='claimed' 的 row,pushed/published 不受影響。
        bun run /opt/alpha-lab/automation/commands/publish-next-research.ts --release-claim "${params.research_run_id}" --owner "${params.claim_owner}"
      fi

steps:
  - id: materialize_candidate
    run: |
      set -euo pipefail
      bun /opt/alpha-lab/automation/commands/materialize-research-candidate.ts \
        --research-run-id "${params.research_run_id}" \
        --owner "${params.claim_owner}" \
        --output "${DAG_RUN_WORK_DIR}/candidate.md"
      test -s "${DAG_RUN_WORK_DIR}/candidate.md"

  - id: publish_via_api
    depends: [materialize_candidate]
    run: |
      set -euo pipefail
      : "${GH_PR_TOKEN:?GH_PR_TOKEN 必须配置在 /etc/alpha-lab/secrets.env}"
      # github-publish.ts 內部:先 GET /contents 確認沒有已存在檔 (idempotent),
      # 再 PUT commit 到 main。一次 call = commit + push,沒有中間態。
      # 新版不需要 DB 的 pushed 中間狀態:PUT 成功即發布完成,失敗即什麼都沒做。
      # 失敗時 failure handler 會 release claim,下次重新 claim 跑 GET+PUT,
      # 若檔案已存在會 detected-as-unchanged 成功 (kill -9 後恢復路徑)。
      bun /opt/alpha-lab/automation/commands/github-publish.ts \
        --candidate "${DAG_RUN_WORK_DIR}/candidate.md" \
        --runtime-sha "${params.runtime_sha}" \
        --run-id "${DAG_RUN_ID}"
    retry_policy:
      limit: 1
      interval_sec: 30
      exit_code: [128, 1]
    stdout:
      outputs: PUBLISH_RESULT
