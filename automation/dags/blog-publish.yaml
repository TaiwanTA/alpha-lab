# Sub-DAG invoked by `fixture-research` after a candidate has been
# produced. The push target is `rebuild/integrate` (not main) so
# the round trip stays on the integration branch while the user
# reviews the v3 PR. Once `rebuild/integrate` merges to main,
# change the push ref to `main` here.
#
# Verified Dagu v2.10.7 syntax only:
#   - `${env.NAME}` is the only strict-binding namespace that resolves
#     to a process environment variable.
#   - `output: VARNAME` captures a step's stdout into a string variable.
#   - `preconditions: [...]` gates a step on shell conditions or value
#     matches; this is how the diff-count gate is implemented.
#   - `working_dir:` (not `dir:`); `DAG_RUN_ID` (not `DAGU_RUN_ID`).
#
# This sub-DAG accepts two parameters:
#   - `candidate_path` (absolute path to the candidate Markdown)
#   - `runtime_sha` (the commit SHA that produced the candidate)
#
# It performs:
#   1. a fresh `rebuild/integrate` checkout into a NEW worktree
#      (never the one that produced the candidate);
#   2. materialization of the candidate into the new worktree;
#   3. the pure draft publisher (CLI entry added in this
#      iteration — see scripts/publish-draft.ts);
#   4. Astro `npm ci` / `npm run lint` / `npm run build`;
#   5. a deterministic diff-count gate (exactly one new Markdown file);
#   6. a single `git commit` + `git push` to `rebuild/integrate`
#      with `GIT_READ_TOKEN` (provided via the shared askpass
#      helper, never embedded in the URL).
#
# It NEVER executes any script from the parent's worktree; the
# checkout here is independent of the parent's `workspace/app`.
#
# Checkout is delegated to `clone-publish.sh` because Dagu
# 2.10.7's `git.checkout` action uses go-git which fails on
# fine-grained PATs. The wrapper uses the same x-access-token
# trick (via GIT_ASKPASS, not argv) as clone-fixture.sh.

params:
  candidate_path: ""
  runtime_sha: ""

artifacts:
  enabled: true
timeout_sec: 900
type: graph

steps:
  - id: checkout
    run: bash /opt/alpha-lab/automation/scripts/clone-publish.sh

  - id: record_workdir
    depends: [checkout]
    working_dir: ./workspace/publish
    run: pwd
    output: WORKDIR

  - id: materialize_candidate
    depends: [record_workdir]
    working_dir: ./workspace/publish
    run: |
      set -euo pipefail
      cp "${params.candidate_path}" "${WORKDIR}/candidate.md"
      test -s "${WORKDIR}/candidate.md"
      echo "Materialized candidate from ${params.candidate_path}"
      echo "Runtime SHA: ${params.runtime_sha}"

  - id: publish_draft
    depends: [materialize_candidate]
    working_dir: ./workspace/publish
    run: |
      set -euo pipefail
      cd "${WORKDIR}/automation"
      bun install --frozen-lockfile
      bun run scripts/publish-draft.ts \
        --candidate "${WORKDIR}/candidate.md" \
        --blog-dir "${WORKDIR}/blog" \
        --runtime-sha "${params.runtime_sha}"
    env:

  - id: site_lint_build
    depends: [publish_draft]
    working_dir: ./workspace/publish
    run: |
      set -euo pipefail
      cd "${WORKDIR}/blog"
      npm ci
      npm run lint
      npm run build

  - id: diff_gate_count
    depends: [site_lint_build]
    working_dir: ./workspace/publish
    run: |
      set -euo pipefail
      # `git add` returns 0 on no-op (path with no changes) and
      # non-zero on real failure (index lock, permission, missing
      # path). Surface the failure; do not mask it with || true.
      git -C "${WORKDIR}" add -- blog/src/content/blog
      git -C "${WORKDIR}" diff --cached --name-only -- 'blog/src/content/blog/*.md' | wc -l
    output: DIFF_COUNT

  - id: diff_gate_publish_path
    depends: [diff_gate_count]
    preconditions:
      - condition: "[ ${DIFF_COUNT:-0} -eq 1 ]"
    working_dir: ./workspace/publish
    run: |
      set -euo pipefail
      git -C "${WORKDIR}" diff --cached --name-only -- 'blog/src/content/blog/*.md' | tr -d '\n'
    output: DIFF_PATH

  - id: commit
    depends: [diff_gate_publish_path]
    working_dir: ./workspace/publish
    run: |
      set -euo pipefail
      git -C "${WORKDIR}" config user.email "alpha-lab-bot@users.noreply.github.com"
      git -C "${WORKDIR}" config user.name "alpha-lab-bot"
      git -C "${WORKDIR}" commit -m "feat(blog): publish draft from fixture-research (${DAG_RUN_ID})"

  - id: push
    depends: [commit]
    working_dir: ./workspace/publish
    run: |
      set -euo pipefail
      export GIT_ASKPASS=/opt/alpha-lab/automation/scripts/git-askpass.sh
      # Username only in URL; password flows through GIT_ASKPASS.
      git -C "${WORKDIR}" push "https://x-access-token@github.com/TaiwanTA/alpha-lab.git" HEAD:rebuild/integrate
    env:
      - GIT_READ_TOKEN=${env.GIT_READ_TOKEN}
    retry_policy:
      limit: 1
      interval_sec: 30
      exit_code: [128]
