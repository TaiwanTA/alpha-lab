# Runs after the weekday settlement DAG completes its normal window.
schedule: "0 22 * * 1-5"
timeout_sec: 300
type: graph
artifacts:
  enabled: true
shell: ["bash", "-e"]
env:
  - DATABASE_URL=${DATABASE_URL}

steps:
  - id: calibrate
    working_dir: /opt/alpha-lab/automation
    run: |
      set -euo pipefail
      bun run commands/calibrate-signals.ts
    env:
      - DATABASE_URL=${env.DATABASE_URL}
    stdout:
      artifact: calibration.json
