# Root DAG for the Dagu safe-publish rebuild.
#
# Verified Dagu v2.10.7 syntax only:
#   - `${env.NAME}` is the only strict-binding namespace that resolves
#     to a process environment variable.
#   - `stdout: { artifact: ... }` is the only form that registers an
#     immutable per-run artifact.
#   - `output: VARNAME` captures a step's stdout into a string variable
#     resolvable as `${VARNAME}` in downstream steps.
#   - `working_dir:` (not `dir:`); `DAG_RUN_ID` (not `DAGU_RUN_ID`).
#   - `action: dag.run` with `with.params` passes named parameters; the
#     child DAG reads them as `${params.NAME}`.
#   - `dag.run` does NOT expose `${step_id.outputs.*}` to the parent in
#     v2.10.7; the child publishes its own results via the standard
#     RunStatus JSON, which is observable in the Dagu UI but is not
#     needed for control flow here.
#
# This DAG owns:
#   - a single, fresh Hermes session for the `alpha-lab-fixture` profile;
#   - one `git rev-parse HEAD` capture for the runtime SHA;
#   - one synchronous `blog-publish` sub-DAG invocation.
# It does NOT own the publish step itself. The publisher and the Git
# push are owned by `blog-publish.yaml`.
#
# Runtime topology on the alpha-lab VM:
#   - dagu runs as a systemd service (PID 1 of the alpha-lab-dagu
#     user), NOT inside a Docker container. The current deployment
#     uses /usr/local/bin/dagu start-all. Migrating to docker
#     compose is tracked separately; for now the dagu process is on
#     the host's network namespace.
#   - Hindsight is reached at `http://127.0.0.1:8888` (host's
#     loopback binding). The wrapper scripts source
#     /etc/alpha-lab/dagu.env to discover the URL.
#   - The hermes CLI lives in the `nousresearch/hermes-agent:latest`
#     image; the wrapper uses `docker run --rm` (one-shot) with
#     bind mounts so the dagu step's workspace is visible to the
#     agent. hermes v0.18.0 has no OpenAI-compatible HTTP
#     endpoint, so HTTP cannot replace the CLI path without an
#     image bump.
#
# Hindsight v0.8.4 retain schema: the request body is
# `{"items": [{"content": "...", "context": "..."}, ...]}`.
# The `facts` alias is NOT accepted; the field is `items`.

artifacts:
  enabled: true
timeout_sec: 900
type: graph

steps:
  - id: checkout
    # Dagu 2.10.7's git.checkout action uses go-git and sends Basic Auth
    # with username="git" when token is set, which GitHub rejects since
    # 2021-08. Even when username/password is provided, the go-git
    # transport still surfaces a similar error against fine-grained PATs.
    # Verified escape hatch: shell `git clone` with x-access-token in
    # the URL works. We use a run step here to keep DAG-only state.
    # dagu 2.10.7 does not interpolate ${env.X} inside the run script
    # body; it only does so in YAML structural values. We delegate to a
    # wrapper script that reads $GIT_READ_TOKEN from the inherited
    # process environment, which is set by the systemd unit's
    # `EnvironmentFile=/etc/alpha-lab/dagu.env`.
    run: bash /opt/alpha-lab/automation/scripts/clone-fixture.sh

  - id: record_runtime_sha
    depends: [checkout]
    working_dir: ./workspace/app
    run: git rev-parse HEAD
    output: RUNTIME_SHA

  - id: record_workdir
    depends: [checkout]
    working_dir: ./workspace/app
    run: pwd
    output: WORKDIR

  - id: hindsight_retain
    depends: [record_workdir]
    working_dir: ./workspace/app
    # Build the retain payload from the offline fixture and POST
    # to the isolated `alpha-lab-v3-fixture` bank. The production
    # `alpha-lab` bank is NEVER touched by the fixture DAG.
    run: |
      set -euo pipefail
      jq -nc --rawfile body automation/fixtures/safe-publish.md \
        '{items: [{content: $body, context: "fixture:safe-publish"}]}' \
        > .hindsight-retain.json
      bash /opt/alpha-lab/automation/scripts/hindsight-retain.sh .hindsight-retain.json
    env:
      - HINDSIGHT_BANK_ID=alpha-lab-v3-fixture
      - HINDSIGHT_API_KEY=${env.HINDSIGHT_API_KEY}
    retry_policy:
      limit: 1
      interval_sec: 10
      exit_code: [1]

  - id: hindsight_recall
    depends: [hindsight_retain]
    working_dir: ./workspace/app
    run: |
      set -euo pipefail
      bash /opt/alpha-lab/automation/scripts/hindsight-recall.sh "alpha-lab offline fixture research" \
        | tee .hindsight-recall.json
      test -s .hindsight-recall.json
    env:
      - HINDSIGHT_BANK_ID=alpha-lab-v3-fixture
      - HINDSIGHT_API_KEY=${env.HINDSIGHT_API_KEY}

  - id: hermes
    depends: [hindsight_recall, record_runtime_sha, record_workdir]
    working_dir: ./workspace/app
    run: |
      set -euo pipefail
      export ALPHA_LAB_RUN_ID="${DAG_RUN_ID}"
      export ALPHA_LAB_WORKSPACE="$PWD"
      export ALPHA_LAB_CANDIDATE_PATH="$PWD/candidate.md"
      # Read the prompt body into HERMES_PROMPT. The wrapper
      # passes it to hermes inside a one-shot container.
      export HERMES_PROMPT="$(cat automation/prompts/fixture-research.md)"
      bash /opt/alpha-lab/automation/scripts/hermes-call.sh
      cat "$ALPHA_LAB_CANDIDATE_PATH"
    env:
      - HINDSIGHT_BANK_ID=alpha-lab-v3-fixture
      - HINDSIGHT_API_KEY=${env.HINDSIGHT_API_KEY}
    stdout:
      artifact: candidate.md
    timeout_sec: 600
    retry_policy:
      limit: 1
      interval_sec: 30
      exit_code: [1]

  - id: publish
    depends: [hermes]
    action: dag.run
    with:
      # Absolute path: dagu 2.10.7's `action: dag.run` resolves
      # the child DAG against the dagu server's CWD, not the
      # configured dags_dir. The child file lives at the
      # dags_dir; an absolute path sidesteps the CWD issue.
      dag: /var/lib/alpha-lab/dagu/dags/blog-publish.yaml
      params:
        candidate_path: "${WORKDIR}/candidate.md"
        runtime_sha: "${RUNTIME_SHA}"
    retry_policy:
      limit: 1
      interval_sec: 30
      exit_code: [1]
