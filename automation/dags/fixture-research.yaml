# Dagu safe-publish 根 DAG (v3 — Hermes 已移除)。
#
# 已驗證 Dagu v2.10.7 語法:
#   - `${env.NAME}` 是唯一能解析到 process env 變數的 namespace。
#   - `stdout: { artifact: ... }` 是唯一能註冊 immutable per-run
#     artifact 的形式。
#   - `output: VARNAME` 把 step 的 stdout 收成字串變數,在下游
#     用 `${VARNAME}` 取。
#   - `working_dir:` (不是 `dir:`);`DAG_RUN_ID` (不是 `DAGU_RUN_ID`)。
#   - `action: dag.run` 用 `with.params` 傳命名參數;子 DAG 用
#     `${params.NAME}` 讀。
#
# 這個 DAG 負責:
#   - checkout git worktree
#   - 一次 `git rev-parse HEAD` 抓 runtime SHA
#   - 一次 LLM research agent (retain + recall + LLM call + candidate 組裝)
#   - 一次同步的 `blog-publish` 子 DAG 呼叫
#
# VM 上的 runtime topology (compose 模式):
#   - dagu 跑在 docker container `alpha-lab-dagu` (image
#     alpha-lab-dagu:local, 自建 Dockerfile.dagu = 官方
#     dagu:2.10.7 + git/node22/bun/ssh/rsync)。PUID/PGID
#     降權到 999:982 (host alpha-lab-dagu user)。
#   - dags-sync sidecar container `alpha-lab-dags-sync`
#     每 5 分鐘從 main 拉 automation/dags/ 同步到 dags_dir。
#   - Hindsight 跑在 docker container `hindsight-hindsight-1`,
#     容器內走 `http://hindsight-hindsight-1:8888` (compose
#     environment 覆蓋 dagu.env 的 host-loopback URL)。
#   - research-agent.ts 是 self-contained TypeScript, 在 dagu
#     container 內直接用 fetch 呼叫 LLM API + Hindsight API,
#     不需要額外的 Docker 容器。
#
# 環境變數:LLM_* + HINDSIGHT_* 從 /etc/alpha-lab/dagu.env
# (compose env_file) 注入 process env,dagu 透過頂層 env:
# block 用 ${NAME} import 到 dagu env scope,step 內用
# ${env.NAME} 讀取。

artifacts:
  enabled: true
timeout_sec: 900
type: graph

# 容器模式下 /bin/sh → dash,不支援 pipefail。用 bash 執行
# 所有 step commands,跟 native 模式 (Fedora /bin/sh → bash)
# 行為一致。

shell: ["bash", "-e"]
env:
  - GIT_READ_TOKEN=${GIT_READ_TOKEN}
  - HINDSIGHT_API_KEY=${HINDSIGHT_API_KEY}
  - HINDSIGHT_BASE_URL=${HINDSIGHT_BASE_URL}
  - LLM_API_KEY=${LLM_API_KEY}
  - LLM_MODEL=${LLM_MODEL}
  - LLM_BASE_URL=${LLM_BASE_URL}
steps:
  - id: checkout
    # Dagu 2.10.7 的 git.checkout action 用 go-git,token 模式下
    # 會送 username="git" 的 Basic Auth,GitHub 從 2021-08 起
    # 拒絕 fine-grained PAT。確認過的解法:用 shell
    # `git clone` + URL 裡放 x-access-token。dagu 2.10.7 不會在
    # run script body 內展開 ${env.X},只在 YAML 結構值內展開,
    # 所以委派給 wrapper script。
    run: bash /opt/alpha-lab/automation/scripts/clone-fixture.sh
    env:
      - GIT_READ_TOKEN=${env.GIT_READ_TOKEN}

  - id: record_runtime_sha
    depends: [checkout]
    working_dir: ./workspace/app
    run: git rev-parse HEAD
    output: RUNTIME_SHA

  - id: record_workdir
    depends: [checkout]
    working_dir: ./workspace/app
    run: pwd
    output: WORKDIR

  - id: research
    # 取代先前的 hindsight_retain + hindsight_recall + hermes 三步。
    # research-agent.ts 自己做 retain + recall + LLM call + candidate
    # 組裝, 一次完成。不需要 Docker, 不需要 Hermes 容器。
    depends: [record_workdir, record_runtime_sha]
    working_dir: ./workspace/app
    run: |
      set -euo pipefail
      export PATH="$HOME/.bun/bin:$PATH"
      export ALPHA_LAB_RUN_ID="${DAG_RUN_ID}"
      export ALPHA_LAB_WORKSPACE="$PWD"
      export ALPHA_LAB_CANDIDATE_PATH="$PWD/candidate.md"
      bun run /opt/alpha-lab/automation/scripts/research-agent.ts
      cat "$ALPHA_LAB_CANDIDATE_PATH"
    env:
      - HINDSIGHT_BANK_ID=alpha-lab-v3-fixture
      - HINDSIGHT_API_KEY=${env.HINDSIGHT_API_KEY}
      - HINDSIGHT_BASE_URL=${env.HINDSIGHT_BASE_URL}
      - LLM_API_KEY=${env.LLM_API_KEY}
      - LLM_MODEL=${env.LLM_MODEL}
      - LLM_BASE_URL=${env.LLM_BASE_URL}
    stdout:
      artifact: candidate.md
    timeout_sec: 600
    retry_policy:
      limit: 1
      interval_sec: 30
      exit_code: [1]

  - id: publish
    depends: [research]
    action: dag.run
    with:
      # 絕對路徑:dagu 2.10.7 的 `action: dag.run` 用 dagu
      # server 的 CWD 解析子 DAG,不是設定的 dags_dir。子檔
      # 在 dags_dir,用絕對路徑繞過 CWD 問題。
      dag: /var/lib/alpha-lab/dagu/dags/blog-publish.yaml
      params:
        candidate_path: "${WORKDIR}/candidate.md"
        runtime_sha: "${RUNTIME_SHA}"
    retry_policy:
      limit: 1
      interval_sec: 30
      exit_code: [1]
