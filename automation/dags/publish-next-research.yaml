schedule: "*/30 * * * *"
timeout_sec: 1200
type: graph
artifacts:
  enabled: true
shell: ["bash", "-e"]
env:
  - DATABASE_URL=${DATABASE_URL}

steps:
  - id: claim
    working_dir: /opt/alpha-lab/automation
    run: |
      set -euo pipefail
      export PATH="$HOME/.bun/bin:$PATH"
      CLAIM_OWNER="${DAG_RUN_ID}"
      bun run scripts/publish-next-research.ts --owner "$CLAIM_OWNER"
    env:
      - DATABASE_URL=${env.DATABASE_URL}
    output: CLAIM_JSON
    stdout:
      artifact: publication-claim.json

  - id: execute_claim
    depends: [claim]
    working_dir: /opt/alpha-lab/automation
    preconditions:
      - condition: "[ -n '${CLAIM_JSON}' ]"
    run: |
      set -euo pipefail
      export PATH="$HOME/.bun/bin:$PATH"
      CLAIM_OWNER="${DAG_RUN_ID}"
      ACTION="$(bun -e 'const value=JSON.parse(process.env.CLAIM_JSON); process.stdout.write(value.action)')"
      RESEARCH_RUN_ID="$(bun -e 'const value=JSON.parse(process.env.CLAIM_JSON); process.stdout.write(value.researchRunId)')"
      # Idempotency guard against retry: if execute_claim already drove
      # this research_run_id past 'claimed' on a prior attempt, skip the
      # destructive child DAG invocation. Without this gate, a retry
      # after a failed --mark-published would re-invoke blog-publish,
      # which would push a second commit to main for the same run.
      PUBLICATION_STATUS="$(bun -e '
        import { SQL } from "bun";
        const url = process.env.DATABASE_URL;
        if (!url) { process.stderr.write("DATABASE_URL missing\n"); process.exit(2); }
        const db = new SQL(url);
        try {
          const rows = await db`SELECT status FROM research_publications WHERE research_run_id = ${process.argv[1]} LIMIT 1`;
          process.stdout.write(rows[0]?.status ?? "missing");
          await db.close();
        } catch (err) {
          process.stderr.write(`db error: ${err instanceof Error ? err.message : String(err)}\n`);
          process.exit(3);
        }
      ' "$RESEARCH_RUN_ID")"
      echo "research_publications.status=${PUBLICATION_STATUS}"
      if [ "$ACTION" = finalize ]; then
        bun run scripts/publish-next-research.ts --mark-published "$RESEARCH_RUN_ID" --owner "$CLAIM_OWNER"
        exit 0
      fi
      if [ "$PUBLICATION_STATUS" != "pushed" ] && [ "$PUBLICATION_STATUS" != "published" ]; then
        dagu start /var/lib/alpha-lab/dagu/dags/blog-publish.yaml \
          --params "research_run_id=$RESEARCH_RUN_ID,claim_owner=$CLAIM_OWNER,runtime_sha=$(git rev-parse HEAD)"
      fi
      bun run scripts/publish-next-research.ts --mark-published "$RESEARCH_RUN_ID" --owner "$CLAIM_OWNER"
    env:
      - DATABASE_URL=${env.DATABASE_URL}
      - CLAIM_JSON=${CLAIM_JSON}
