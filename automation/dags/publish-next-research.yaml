schedule: "*/30 * * * *"
timeout_sec: 1200
type: graph
artifacts:
  enabled: true
shell: ["bash", "-e"]
env:
  - DATABASE_URL=${DATABASE_URL}

steps:
  - id: claim
    working_dir: /opt/alpha-lab/automation
    run: |
      set -euo pipefail
      export PATH="$HOME/.bun/bin:$PATH"
      CLAIM_OWNER="${DAG_RUN_ID}"
      bun run scripts/publish-next-research.ts --owner "$CLAIM_OWNER"
    env:
      - DATABASE_URL=${env.DATABASE_URL}
    output: CLAIM_JSON
    stdout:
      artifact: publication-claim.json

  - id: execute_claim
    depends: [claim]
    working_dir: /opt/alpha-lab/automation
    preconditions:
      - condition: "[ -n '${CLAIM_JSON}' ]"
    run: |
      set -euo pipefail
      export PATH="$HOME/.bun/bin:$PATH"
      CLAIM_OWNER="${DAG_RUN_ID}"
      ACTION="$(bun -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(value.action)' "$CLAIM_JSON")"
      RESEARCH_RUN_ID="$(bun -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(value.researchRunId)' "$CLAIM_JSON")"
      if [ "$ACTION" = finalize ]; then
        bun run scripts/publish-next-research.ts --mark-published "$RESEARCH_RUN_ID" --owner "$CLAIM_OWNER"
        exit 0
      fi
      dagu start /var/lib/alpha-lab/dagu/dags/blog-publish.yaml \
        --params "research_run_id=$RESEARCH_RUN_ID,claim_owner=$CLAIM_OWNER,runtime_sha=$(git rev-parse HEAD)"
      bun run scripts/publish-next-research.ts --mark-published "$RESEARCH_RUN_ID" --owner "$CLAIM_OWNER"
    env:
      - DATABASE_URL=${env.DATABASE_URL}
    retry_policy:
      limit: 2
      interval_sec: 60
      exit_code: [1]
