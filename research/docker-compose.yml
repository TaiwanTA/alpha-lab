services:
  postgres:
    image: postgres:16-alpine
    container_name: alpha-lab-postgres
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: alpha_lab
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

volumes:
  pgdata:
