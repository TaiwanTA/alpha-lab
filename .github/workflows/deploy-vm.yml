name: Deploy to VM

on:
  push:
    branches: [main]
    paths:
      - compose.yml
      - automation/deploy/dagu/alpha-lab-dagu.service
      - automation/deploy/dagu/cleanup-dagu-workdir.sh
      - automation/deploy/dagu/alpha-lab-dagu-cleanup.service
      - automation/deploy/dagu/alpha-lab-dagu-cleanup.timer
      - automation/deploy/dagu/journald.conf
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Workload Identity Federation 需要

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Workload Identity Federation 認證
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # scp Compose, systemd units, cleanup script, and journald policy to VM
      - name: Copy files to VM
        run: |
          gcloud compute scp --zone "asia-east1-b" \
            compose.yml \
            automation/deploy/dagu/alpha-lab-dagu.service \
            automation/deploy/dagu/cleanup-dagu-workdir.sh \
            automation/deploy/dagu/alpha-lab-dagu-cleanup.service \
            automation/deploy/dagu/alpha-lab-dagu-cleanup.timer \
            automation/deploy/dagu/journald.conf \
            alpha-lab:/tmp/ --project "g6online-352310"

      # install + pull + reload
      - name: Install and reload
        run: |
          gcloud compute ssh --zone "asia-east1-b" alpha-lab --project "g6online-352310" --command '
            set -e
            sudo install -m 0644 /tmp/compose.yml /opt/alpha-lab/compose.yml
            sudo install -m 0644 /tmp/alpha-lab-dagu.service /etc/systemd/system/alpha-lab-dagu.service
            sudo install -m 0755 /tmp/cleanup-dagu-workdir.sh /usr/local/sbin/cleanup-dagu-workdir.sh
            sudo install -m 0644 /tmp/alpha-lab-dagu-cleanup.service /etc/systemd/system/alpha-lab-dagu-cleanup.service
            sudo install -m 0644 /tmp/alpha-lab-dagu-cleanup.timer /etc/systemd/system/alpha-lab-dagu-cleanup.timer
            sudo install -m 0644 /tmp/journald.conf /etc/systemd/journald.conf
            sudo rm -f /tmp/compose.yml /tmp/alpha-lab-dagu.service \
              /tmp/cleanup-dagu-workdir.sh /tmp/alpha-lab-dagu-cleanup.service \
              /tmp/alpha-lab-dagu-cleanup.timer /tmp/journald.conf
            sudo systemctl daemon-reload
            sudo test -f /etc/alpha-lab/stack.env || { echo "ERROR: missing /etc/alpha-lab/stack.env"; exit 1; }
            sudo systemctl enable --now alpha-lab-dagu-cleanup.timer
            sudo systemctl restart systemd-journald
            compose_config=$(sudo /usr/bin/docker compose --env-file /etc/alpha-lab/stack.env \
              -f /opt/alpha-lab/compose.yml config)
            ghcr_services=""
            current_service=""
            while IFS= read -r line; do
              case "${line}" in
                "  "[![:space:]]*:)
                  current_service="${line#  }"
                  current_service="${current_service%:}"
                  ;;
                "    image: ghcr.io/"*)
                  ghcr_services="${ghcr_services} ${current_service}"
                  ;;
              esac
            done < <(printf '%s\n' "${compose_config}")
            if [ -z "${ghcr_services}" ]; then
              echo "ERROR: no GHCR services found in compose configuration"
              exit 1
            fi
            sudo /usr/bin/docker compose --env-file /etc/alpha-lab/stack.env \
              -f /opt/alpha-lab/compose.yml pull ${ghcr_services}
            # alpha-lab-dagu.service ExecReload uses --force-recreate.
            sudo systemctl reload alpha-lab-dagu.service
          '

      # verify
      - name: Verify
        run: |
          gcloud compute ssh --zone "asia-east1-b" alpha-lab --project "g6online-352310" --command '
            set -e
            expected_services=$(sudo /usr/bin/docker compose --env-file /etc/alpha-lab/stack.env \
              -f /opt/alpha-lab/compose.yml config --services)
            services_ready=0
            for i in $(seq 1 120); do
              services_ready=1
              for service in ${expected_services}; do
                container=$(sudo /usr/bin/docker compose --env-file /etc/alpha-lab/stack.env \
                  -f /opt/alpha-lab/compose.yml ps -q "${service}" 2>/dev/null || true)
                if [ -z "${container}" ]; then
                  services_ready=0
                  break
                fi
                state=$(sudo docker inspect -f "{{.State.Status}}" "${container}" 2>/dev/null || true)
                health=$(sudo docker inspect -f "{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" \
                  "${container}" 2>/dev/null || true)
                if [ "${state}" != "running" ] || { [ "${health}" != "none" ] && [ "${health}" != "healthy" ]; }; then
                  services_ready=0
                  break
                fi
              done
              if [ "${services_ready}" -eq 1 ]; then
                echo "compose services running and healthy"
                break
              fi
              sleep 2
            done
            sudo docker ps --format "table {{.Names}}\t{{.Status}}"
            sudo systemctl is-enabled alpha-lab-dagu-cleanup.timer
            sudo systemctl is-active alpha-lab-dagu-cleanup.timer
            if [ "${services_ready}" -ne 1 ]; then
              echo "ERROR: compose services not ready after 120 retries"
              exit 1
            fi
            dagu_ready=0
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://127.0.0.1:8080/; then
                dagu_ready=1
                echo "dagu ready"
                break
              fi
              sleep 2
            done
            if [ "${dagu_ready}" -ne 1 ]; then
              echo "ERROR: dagu not ready after 30 retries"
              exit 1
            fi
            curl -fsS -o /dev/null -w "dagu http: %{http_code}\n" http://127.0.0.1:8080/
            hindsight_ready=0
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://127.0.0.1:8888/health; then
                hindsight_ready=1
                echo "hindsight ready"
                break
              fi
              sleep 2
            done
            if [ "${hindsight_ready}" -ne 1 ]; then
              echo "ERROR: hindsight not ready after 30 retries"
              exit 1
            fi
            curl -fsS -o /dev/null -w "hindsight api: %{http_code}\n" http://127.0.0.1:8888/health
          '
