name: Deploy to VM

on:
  push:
    branches: [main]
    paths:
      - compose.yml
      - automation/deploy/dagu/alpha-lab-dagu.service
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Workload Identity Federation 需要

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Workload Identity Federation 認證
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # scp compose.yml + systemd unit 到 VM
      - name: Copy files to VM
        run: |
          gcloud compute scp --zone "asia-east1-b" \
            compose.yml \
            automation/deploy/dagu/alpha-lab-dagu.service \
            alpha-lab:/tmp/ --project "g6online-352310"

      # install + pull + reload
      - name: Install and reload
        run: |
          gcloud compute ssh --zone "asia-east1-b" alpha-lab --project "g6online-352310" --command '
            set -e
            sudo install -m 0644 /tmp/compose.yml /opt/alpha-lab/compose.yml
            sudo install -m 0644 /tmp/alpha-lab-dagu.service /etc/systemd/system/alpha-lab-dagu.service
            sudo systemctl daemon-reload
            sudo test -f /etc/alpha-lab/stack.env || { echo "ERROR: missing /etc/alpha-lab/stack.env"; exit 1; }
            compose_config=$(sudo /usr/bin/docker compose --env-file /etc/alpha-lab/stack.env \
              -f /opt/alpha-lab/compose.yml config)
            ghcr_services=""
            current_service=""
            while IFS= read -r line; do
              case "${line}" in
                "  "[![:space:]]*:)
                  current_service="${line#  }"
                  current_service="${current_service%:}"
                  ;;
                "    image: ghcr.io/"*)
                  ghcr_services="${ghcr_services} ${current_service}"
                  ;;
              esac
            done <<EOF
          ${compose_config}
          EOF
            if [ -z "${ghcr_services}" ]; then
              echo "ERROR: no GHCR services found in compose configuration"
              exit 1
            fi
            sudo /usr/bin/docker compose --env-file /etc/alpha-lab/stack.env \
              -f /opt/alpha-lab/compose.yml pull ${ghcr_services}
            # alpha-lab-dagu.service ExecReload uses --force-recreate.
            sudo systemctl reload alpha-lab-dagu.service
          '

      # verify
      - name: Verify
        run: |
          gcloud compute ssh --zone "asia-east1-b" alpha-lab --project "g6online-352310" --command '
            set -e
            expected="alpha-lab-dagu alpha-lab-dags-sync hindsight hindsight-db alpha-lab-postgres mastra-app"
            for service in ${expected}; do
              if ! sudo docker inspect -f "{{.State.Status}}" "${service}" 2>/dev/null | grep -qx running; then
                echo "ERROR: ${service} is not running"
                sudo docker ps --format "table {{.Names}}\t{{.Status}}"
                exit 1
              fi
            done
            sudo docker ps --format "table {{.Names}}\t{{.Status}}"
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://127.0.0.1:8080/; then
                echo "dagu ready"
                break
              fi
              sleep 2
            done
            curl -fsS -o /dev/null -w "dagu http: %{http_code}\n" http://127.0.0.1:8080/
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null http://127.0.0.1:8888/health; then
                echo "hindsight ready"
                break
              fi
              sleep 2
            done
            curl -fsS -o /dev/null -w "hindsight api: %{http_code}\n" http://127.0.0.1:8888/health
          '
