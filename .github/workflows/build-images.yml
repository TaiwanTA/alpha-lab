name: Build and publish runtime images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-runtime-images-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN 只需要讀取 repository 與寫入 GHCR package。
# alpha-lab 目前是 private repository；VM pull 時仍需一枚具
# read:packages 權限的 PAT 或等效 GitHub App credential。
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: alpha-lab-dagu
            dockerfile: automation/deploy/dagu/Dockerfile.dagu
            context: .
          - image: alpha-lab-dags-sync
            dockerfile: automation/deploy/dagu/Dockerfile.dags-sync
            context: automation/deploy/dagu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (push only)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/taiwanta/${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # pull_request 只建置驗證，不推送 package。
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true
